<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head  >
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<div class="table">

    <h3>Employee Directory</h3>
    <hr>
    <a th:href ="@{/student/showformstudent}"
       class="btn btn-primary btn-sm mb-3"> Add Student </a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Rollno</th>
            <th>Technology</th>
            <th>Gender</th>
            <th>Name</th>
            <th>Action</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tempstudent : ${allstudent}">
            <td th:text="${tempstudent.rollno}"/>
            <td th:text="${tempstudent.technology}"/>
            <td th:text="${tempstudent.gender}"/>
            <td th:text="${tempstudent.name}"/>
            <td>
                <a th:href="@{/student/showupdateform(studentrollno=${tempstudent.rollno})}"
                   class="btn btn-info btn-sm">
                    Update
                </a>
            </td>
            <td>
                <a th:href="@{/student/studentiddelete(studentrollno=${tempstudent.rollno})}"
                   class="btn btn-info btn-sm"
                   onclick="if (!(confirm('Are you sure you want to delete this employee?'))) return false">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>


</div>
</form>
</body>
</html>
