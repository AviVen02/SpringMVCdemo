<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<div class="container">

    <h3>Employee Directory</h3>
    <hr>

    <p class="h4 mb-4">Save Employee</p>

    <form th:action="@{/student/processstudentform}" th:object="${student}" method="POST">
        <input type="text" th:field="*{rollno}" class="form-control mb-4 w-25" th:placeholder="Rollno">
        <input type="text" th:field="*{technology}" class="form-control mb-4 w-25" th:placeholder="technology">
        <input type="text" th:field="*{gender}" class="form-control mb-4 w-25" th:placeholder="gender">
        <input type="text" th:field="*{name}" class="form-control mb-4 w-25" th:placeholder="name">

        <button type="submit" class="btn btn-info col-2">Save</button>
    </form>
    <hr>
    <a th:href="@{/student/show}" class="btn btn-primary btn-sm mb-3">Back to Student List </a>
</div>
</body>
</html>
