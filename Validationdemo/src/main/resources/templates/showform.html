<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Form</title>
    <style>
        .error{color:red}
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>
<form th:action="@{/processform}" th:object="${customers}" method="POST">
  <br>
Firstname : <input type="text" th:field="*{firstname}"/>
<br>
Lastname* : <input type="text" th:field="*{lastname}"/>

    <span th:if ="${#fields.hasErrors('Lastname')}"
          th:errors="*{Lastname}"
          class="error"></span>

    <br>
    Free passes: <input type="text" th:field="*{freePasses}" />

    <!-- Add error message (if present) -->
    <span th:if="${#fields.hasErrors('freePasses')}"
          th:errors="*{freePasses}"
          class="error"></span>


<br>
    <input type="submit" value="submit">

</form>
</body>
</html>
